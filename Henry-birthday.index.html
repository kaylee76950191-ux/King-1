<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For Henry 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#ffe6ee;
    --petal:#ffc9d9;
    --rose:#f79ab8;
    --raspberry:#c8386f;
    --deep:#a02857;
    --cream:#fff9f6;
    --sage:#5ea36b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Quicksand',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    background:radial-gradient(120% 90% at 80% 15%, #f9b8c9 0%, var(--blush) 55%, #ffd9e4 100%);
    color:var(--raspberry);
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    position:relative;
    height:100dvh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* ---------- floating hearts backdrop ---------- */
  .float-heart{
    position:fixed;
    bottom:-40px;
    font-size:22px;
    opacity:.55;
    animation:floatUp linear forwards;
    pointer-events:none;
    z-index:1;
  }
  @keyframes floatUp{
    from{transform:translateY(0) rotate(-8deg);}
    to{transform:translateY(-115vh) rotate(10deg);opacity:0;}
  }

  /* ---------- music button ---------- */
  #musicBtn{
    position:fixed;top:16px;right:16px;z-index:50;
    width:44px;height:44px;border-radius:50%;
    border:2px solid rgba(200,56,111,.35);
    background:rgba(255,255,255,.75);
    font-size:20px;cursor:pointer;
    display:none;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
    transition:transform .2s;
  }
  #musicBtn:active{transform:scale(.9);}
  #musicBtn.spin{animation:spin 4s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- scenes ---------- */
  .scene{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:28px;
    opacity:0;
    pointer-events:none;
    transition:opacity .6s ease;
    z-index:5;
  }
  .scene.active{opacity:1;pointer-events:auto;}

  /* ---------- intro ---------- */
  #intro .cake{font-size:72px;animation:bounce 1.6s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
  #intro h1{
    font-family:'Baloo 2',cursive;
    font-size:clamp(34px,9vw,56px);
    color:var(--raspberry);
    text-shadow:0 3px 0 rgba(255,255,255,.7);
    margin-top:10px;
  }
  .tap-hint{
    margin-top:34px;
    font-weight:700;
    font-size:15px;
    color:var(--deep);
    opacity:.75;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:.9;}}

  /* ---------- message scene ---------- */
  #messages{cursor:pointer;}
  .msg{
    font-family:'Baloo 2','Quicksand',cursive;
    font-size:clamp(26px,7vw,44px);
    font-weight:700;
    line-height:1.35;
    color:var(--raspberry);
    text-shadow:0 2px 0 rgba(255,255,255,.65);
    max-width:640px;
    opacity:0;
    transform:translateY(16px) scale(.97);
    transition:opacity .55s ease, transform .55s ease;
  }
  .msg.show{opacity:1;transform:translateY(0) scale(1);}
  .msg .hearts{display:block;font-size:.7em;margin-top:14px;}
  #messages .tap-hint{position:absolute;bottom:8vh;left:0;right:0;}

  /* ---------- gift scene ---------- */
  #gifts h2{
    font-family:'Baloo 2',cursive;
    font-size:clamp(24px,6.5vw,38px);
    margin-bottom:6px;
    text-shadow:0 2px 0 rgba(255,255,255,.65);
  }
  #gifts p.sub{font-weight:600;font-size:15px;color:var(--deep);opacity:.8;margin-bottom:22px;}
  .gift-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    max-width:420px;
  }
  .gift{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--cream);
    border:3px solid var(--petal);
    border-radius:22px;
    padding:16px 18px;
    cursor:pointer;
    text-align:left;
    font-family:inherit;
    box-shadow:0 6px 0 rgba(200,56,111,.15);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s;
  }
  .gift:hover{border-color:var(--rose);}
  .gift:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(200,56,111,.15);}
  .gift .badge{
    flex:0 0 auto;
    width:38px;height:38px;border-radius:50%;
    background:var(--raspberry);color:#fff;
    font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;
  }
  .gift .emoji{font-size:26px;flex:0 0 auto;}
  .gift .label{
    font-weight:700;
    font-size:16px;
    color:var(--deep);
    line-height:1.35;
  }
  .gift .label.mystery{
    letter-spacing:6px;
    color:var(--rose);
  }
  .gift.revealed{
    border-color:var(--rose);
    background:#fff;
    animation:reveal .45s ease;
  }
  .gift.revealed .emoji{animation:reveal .45s ease;}
  @keyframes reveal{
    0%{transform:scale(.92) rotate(-2deg);}
    55%{transform:scale(1.05) rotate(1.5deg);}
    100%{transform:scale(1) rotate(0);}
  }
  .pick-hint{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--sage);
    margin-top:4px;
  }

  /* ---------- finale ---------- */
  #finale h1{
    font-family:'Baloo 2',cursive;
    font-size:clamp(38px,11vw,72px);
    letter-spacing:1px;
    color:var(--raspberry);
    text-shadow:0 4px 0 rgba(255,255,255,.75);
    animation:party 1.1s ease-in-out infinite;
  }
  @keyframes party{0%,100%{transform:rotate(-2deg) scale(1);}50%{transform:rotate(2deg) scale(1.05);}}
  #finale .love{
    font-family:'Baloo 2',cursive;
    font-size:clamp(20px,5.5vw,30px);
    font-weight:700;
    margin-top:18px;
    color:var(--deep);
  }
  #finale .chosen{
    margin-top:26px;
    background:var(--cream);
    border:3px dashed var(--rose);
    border-radius:20px;
    padding:14px 22px;
    font-weight:700;
    font-size:15px;
    color:var(--deep);
    max-width:420px;
  }
  .confetti{
    position:fixed;
    top:-30px;
    font-size:20px;
    pointer-events:none;
    z-index:40;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(115vh) rotate(360deg);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition-duration:.01s !important;}
  }
</style>
</head>
<body>
<audio id="bgm" src="music.mp3" loop preload="auto"></audio>
<button id="musicBtn" aria-label="音乐开关">🎵</button>

<div id="app">

  <!-- Scene 1: intro -->
  <section class="scene active" id="intro">
    <div class="cake">🎂</div>
    <h1>A little surprise…</h1>
    <div class="tap-hint">♡ 点一下开始 · tap to start ♡</div>
  </section>

  <!-- Scene 2: messages -->
  <section class="scene" id="messages">
    <div class="msg" id="msgBox"></div>
    <div class="tap-hint">♡ tap ♡</div>
  </section>

  <!-- Scene 3: gifts -->
  <section class="scene" id="gifts">
    <h2>🎁 生日礼物选项 🎁</h2>
    <p class="sub">神秘盲盒 · 点一下揭晓，再点一下选定！</p>
    <div class="gift-list">
      <button class="gift" data-letter="A" data-emoji="🏞️" data-label="温德米尔湖区住宿" data-gift="A · 温德米尔湖区住宿 🏞️">
        <span class="badge">A</span><span class="emoji">🎁</span>
        <span class="label mystery">？？？</span>
      </button>
      <button class="gift" data-letter="B" data-emoji="🧱" data-label="乐高" data-gift="B · 乐高 🧱">
        <span class="badge">B</span><span class="emoji">🎁</span>
        <span class="label mystery">？？？</span>
      </button>
      <button class="gift" data-letter="C" data-emoji="🛒" data-label="清空Tesco购物车一次" data-gift="C · 清空Tesco购物车一次 🛒">
        <span class="badge">C</span><span class="emoji">🎁</span>
        <span class="label mystery">？？？</span>
      </button>
      <button class="gift" data-letter="D" data-emoji="🏰" data-label="法国迪士尼门票一张<br><small>（普通不含快通）</small>" data-gift="D · 法国迪士尼门票一张（普通不含快通）🏰">
        <span class="badge">D</span><span class="emoji">🎁</span>
        <span class="label mystery">？？？</span>
      </button>
    </div>
  </section>

  <!-- Scene 4: finale -->
  <section class="scene" id="finale">
    <h1>HAPPY<br>BIRTHDAY!</h1>
    <div class="love">May i always be with you, love you! 💗</div>
    <div class="chosen" id="chosenGift"></div>
  </section>

</div>

<script>
  const messages = [
    "Hi",
    "Henry",
    "I really like your name btw!",
    "It’s your birthday!! :D",
    "Happy birthday to you!!<span class='hearts'>🎉🎂🎉</span>",
    "Wishing you a wonderful year ahead filled with joy, love, and endless happiness!",
    "That's what I was going to do.",
    "But I realised, I wanted to do something special",
    "Because,",
    "You are Special :)<span class='hearts'>💕</span>"
  ];

  const bgm = document.getElementById('bgm');
  const musicBtn = document.getElementById('musicBtn');
  const intro = document.getElementById('intro');
  const msgScene = document.getElementById('messages');
  const msgBox = document.getElementById('msgBox');
  const giftScene = document.getElementById('gifts');
  const finale = document.getElementById('finale');
  const chosenGift = document.getElementById('chosenGift');

  let idx = -1;
  let busy = false;
  let musicOn = false;

  function switchScene(from, to){
    from.classList.remove('active');
    setTimeout(()=>to.classList.add('active'), 350);
  }

  function tryPlayMusic(){
    bgm.play().then(()=>{
      musicOn = true;
      musicBtn.style.display = 'flex';
      musicBtn.classList.add('spin');
      musicBtn.textContent = '🎵';
    }).catch(()=>{ /* 没有 music.mp3 或被浏览器拦截时静默跳过 */ });
  }

  musicBtn.addEventListener('click', e=>{
    e.stopPropagation();
    if(musicOn){ bgm.pause(); musicBtn.textContent='🔇'; musicBtn.classList.remove('spin'); }
    else{ bgm.play(); musicBtn.textContent='🎵'; musicBtn.classList.add('spin'); }
    musicOn = !musicOn;
  });

  intro.addEventListener('click', ()=>{
    tryPlayMusic();
    switchScene(intro, msgScene);
    setTimeout(nextMessage, 700);
  });

  function nextMessage(){
    if(busy) return;
    idx++;
    if(idx >= messages.length){
      switchScene(msgScene, giftScene);
      return;
    }
    busy = true;
    msgBox.classList.remove('show');
    setTimeout(()=>{
      msgBox.innerHTML = messages[idx];
      msgBox.classList.add('show');
      busy = false;
    }, idx === 0 ? 50 : 420);
  }
  msgScene.addEventListener('click', nextMessage);

  document.querySelectorAll('.gift').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!btn.classList.contains('revealed')){
        // 第一次点击：揭晓盲盒内容
        btn.classList.add('revealed');
        btn.querySelector('.emoji').textContent = btn.dataset.emoji;
        const label = btn.querySelector('.label');
        label.classList.remove('mystery');
        label.innerHTML = btn.dataset.label + '<span class="pick-hint">再点一下选定 ✓</span>';
      }else{
        // 第二次点击：选定这个礼物
        chosenGift.textContent = '你的选择：' + btn.dataset.gift;
        switchScene(giftScene, finale);
        startConfetti();
      }
    });
  });

  /* ---------- ambient floating hearts ---------- */
  const heartEmoji = ['💗','💖','🩷','💕','🎀'];
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = heartEmoji[Math.floor(Math.random()*heartEmoji.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = (14 + Math.random()*20) + 'px';
    h.style.animationDuration = (7 + Math.random()*7) + 's';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 15000);
  }
  setInterval(spawnHeart, 900);

  /* ---------- confetti on finale ---------- */
  const confettiEmoji = ['🎉','💗','✨','🎂','🎈','💖','⭐'];
  function startConfetti(){
    let count = 0;
    const timer = setInterval(()=>{
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = confettiEmoji[Math.floor(Math.random()*confettiEmoji.length)];
      c.style.left = Math.random()*100 + 'vw';
      c.style.fontSize = (16 + Math.random()*18) + 'px';
      c.style.animationDuration = (2.5 + Math.random()*3) + 's';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 6000);
      if(++count > 120) clearInterval(timer);
    }, 60);
  }
</script>
</body>
</html>
